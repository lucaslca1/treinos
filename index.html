<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080B14;--card:#0f1420;--border:#1a2030;
  --text:#ffffff;--sub:#8892a0;--hint:#44505e;
  --orange:#F97316;--blue:#3B82F6;--teal:#14B8A6;
  --green:#22C55E;--red:#EF4444;--purple:#8B5CF6;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;
  min-height:100vh;min-height:100dvh;overscroll-behavior:none;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{max-width:480px;margin:0 auto;padding:20px 16px 60px}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.hdr-left .date{font-size:26px;font-weight:700;line-height:1.1}
.hdr-left .streak{font-size:13px;color:var(--orange);margin-top:4px}
.nav-btns{display:flex;gap:8px;align-items:center}
.nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:6px 14px;font-size:18px;font-weight:600;cursor:pointer}
.today-btn{font-size:11px!important;letter-spacing:.3px}

/* Week strip */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;
  background:var(--card);border-radius:12px;padding:8px;margin-bottom:20px}
.day-btn{border-radius:8px;padding:6px 0;text-align:center;border:1.5px solid transparent;
  cursor:pointer;background:transparent;transition:all .15s}
.day-btn.selected{background:var(--orange)}
.day-btn.today-outline{border-color:var(--orange)}
.day-short{font-size:10px;color:var(--hint);display:block}
.day-selected .day-short{color:rgba(255,255,255,.7)}
.day-num{font-size:14px;font-weight:600;color:var(--sub);display:block}
.day-selected .day-num{color:#fff}
.day-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0;background:transparent}

/* Rest card */
.rest-card{background:var(--card);border-radius:14px;padding:32px;
  text-align:center;border:1px solid var(--border)}
.rest-icon{font-size:40px;margin-bottom:10px}
.rest-title{font-size:22px;font-weight:700}
.rest-sub{font-size:14px;color:var(--sub);margin-top:4px}
.rest-opt{font-size:13px;color:var(--orange);margin-top:14px}

/* Workout card */
.wcard{background:var(--card);border-radius:14px;padding:16px;
  border:1px solid var(--border);border-left:3px solid;margin-bottom:12px;
  transition:opacity .2s}
.wcard.done{opacity:.8}
.wtag{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.wtitle{font-size:20px;font-weight:700;transition:all .2s}
.wdone .wtitle{text-decoration:line-through;color:var(--sub)}
.wmeta{font-size:13px;color:var(--sub);margin-top:3px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}

/* Done button */
.done-btn{width:42px;height:42px;border-radius:50%;border:2px solid var(--hint);
  background:transparent;color:var(--hint);font-size:20px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;transition:all .25s}
.done-btn.checked{background:var(--green);border-color:var(--green);color:#fff}

/* Expand button */
.expand-btn{background:transparent;border:none;color:var(--hint);
  font-size:12px;cursor:pointer;padding:0;margin-top:10px;letter-spacing:.3px}

/* Exercise rows */
.ex-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.ex-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--bg);border-radius:8px}
.ex-num{font-size:10px;color:var(--hint);min-width:22px;flex-shrink:0}
.ex-name{flex:1;font-size:13px;color:var(--text)}
.ex-sets{font-size:12px;color:var(--orange);font-weight:600;flex-shrink:0}
.ex-load{font-size:11px;color:var(--hint);margin-left:6px;flex-shrink:0}

/* Run steps */
.step-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.step-row{display:flex;gap:10px;padding:8px 10px;background:var(--bg);border-radius:8px}
.step-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0}
.step-name{font-size:13px;color:var(--text);font-weight:500}
.step-info{font-size:12px;color:var(--sub)}

/* Bottom stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:20px}
.stat-card{background:var(--card);border-radius:10px;padding:12px 8px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:22px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
</style>
</head>
<body>
<div id="app"></div>

<script>
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','SÃ¡b'];
const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const SHORT=['D','S','T','Q','Q','S','S'];

const GYM={
  A:{label:'Treino A',name:'Peito + TrÃ­ceps',dur:'60 min',tag:'Academia',color:'var(--blue)',exs:[
    {n:'A3',name:'Supino halteres banco plano',sets:'4Ã8-12',load:'8-12 kg'},
    {n:'A4',name:'Crucifixo halteres',sets:'3Ã12',load:'4-8 kg'},
    {n:'A5',name:'FlexÃ£o declinada no espaldar',sets:'3Ã10-15',load:'corpo'},
    {n:'A6',name:'Supino inclinado halteres',sets:'3Ã10-12',load:'6-10 kg'},
    {n:'A7',name:'Pullover com halter',sets:'3Ã12',load:'6-10 kg'},
    {n:'A8',name:'TrÃ­ceps banco (dips)',sets:'4Ã12-15',load:'corpo'},
    {n:'A9',name:'TrÃ­ceps testa halteres',sets:'3Ã12',load:'4-6 kg'},
    {n:'A10',name:'ExtensÃ£o trÃ­ceps TRX',sets:'3Ã12-15',load:'Ã¢ngulo'},
    {n:'A11',name:'Kickback com halter',sets:'3Ã15',load:'3-6 kg'},
    {n:'A12',name:'FlexÃ£o atÃ© a falha',sets:'2Ãmax',load:'corpo'},
  ]},
  B:{label:'Treino B',name:'Costas + BÃ­ceps',dur:'65 min',tag:'Academia',color:'var(--blue)',exs:[
    {n:'B3',name:'Remada curvada com barra',sets:'4Ã8-10',load:'20-40 kg'},
    {n:'B4',name:'Remada unilateral halter',sets:'3Ã10-12',load:'8-14 kg'},
    {n:'B5',name:'Remada TRX (inverted row)',sets:'3Ã12-15',load:'Ã¢ngulo'},
    {n:'B6',name:'Pullover halter (costas)',sets:'3Ã12',load:'8-12 kg'},
    {n:'B7',name:'HiperextensÃ£o no espaldar',sets:'3Ã15',load:'corpo'},
    {n:'B8',name:'Remada alta halteres',sets:'3Ã12',load:'6-10 kg'},
    {n:'B9',name:'Rosca direta halteres',sets:'4Ã10-12',load:'6-12 kg'},
    {n:'B10',name:'Rosca martelo alternada',sets:'3Ã12',load:'6-10 kg'},
    {n:'B11',name:'Rosca concentrada',sets:'3Ã12-15',load:'4-8 kg'},
    {n:'B13',name:'Rosca 21s halteres',sets:'2Ã21',load:'4-8 kg'},
  ]},
  C:{label:'Treino C',name:'Ombros + Core',dur:'65 min',tag:'Academia',color:'var(--blue)',exs:[
    {n:'C3',name:'Desenvolvimento halteres',sets:'4Ã10-12',load:'6-12 kg'},
    {n:'C4',name:'ElevaÃ§Ã£o lateral halteres',sets:'3Ã15',load:'3-6 kg'},
    {n:'C5',name:'ElevaÃ§Ã£o frontal alternada',sets:'3Ã12',load:'3-6 kg'},
    {n:'C6',name:'Shrugs com halteres',sets:'3Ã15',load:'10-16 kg'},
    {n:'C7',name:'Swing kettlebell',sets:'4Ã20',load:'8-12 kg'},
    {n:'C9',name:'Prancha frontal',sets:'3Ã45-60s',load:''},
    {n:'C10',name:'Prancha lateral c/ elevaÃ§Ã£o',sets:'3Ã30s/lado',load:''},
    {n:'C11',name:'Crunch com bola medicinal',sets:'3Ã20',load:'3 kg'},
    {n:'C12',name:'Mountain climber',sets:'3Ã40s',load:''},
    {n:'C14',name:'Swing + thruster KB circuito',sets:'3Ã10+10',load:'6-10 kg'},
  ]},
};

const RUN={
  leve:{label:'Corrida Leve',name:'6 km',dur:'43 min',pace:'6:30â7:00/km',tag:'Corrida',color:'var(--teal)',steps:[
    {name:'Aquecimento trote',type:'warmup',info:'8 min Â· 7:00â7:30/km'},
    {name:'Ritmo fÃ¡cil',type:'run',info:'5 km Â· 6:30â7:00/km'},
    {name:'Desaquecimento',type:'cool',info:'5 min Â· 7:00â8:00/km'},
  ]},
  tempo:{label:'Tempo Run',name:'7 km',dur:'47 min',pace:'5:30/km',tag:'Corrida',color:'var(--teal)',steps:[
    {name:'Aquecimento',type:'warmup',info:'10 min Â· 6:30â7:30/km'},
    {name:'Progressivo',type:'interval',info:'1 km Â· 5:50â6:20/km'},
    {name:'Tempo pace',type:'interval',info:'3 km Â· 5:15â5:45/km'},
    {name:'RecuperaÃ§Ã£o ativa',type:'recovery',info:'3 min Â· livre'},
    {name:'Desaquecimento',type:'cool',info:'7 min Â· 6:30â7:30/km'},
  ]},
  longao:{label:'LongÃ£o',name:'11 km',dur:'78 min',pace:'6:30â7:00/km',tag:'Corrida',color:'var(--teal)',steps:[
    {name:'Aquecimento trote',type:'warmup',info:'8 min Â· 7:00â8:00/km'},
    {name:'Ritmo confortÃ¡vel',type:'run',info:'5 km Â· 6:30â7:00/km'},
    {name:'Ritmo mantido',type:'run',info:'3 km Â· 6:15â6:45/km'},
    {name:'Progressivo final',type:'interval',info:'2 km Â· 5:50â6:30/km'},
    {name:'Desaquecimento',type:'cool',info:'8 min Â· 7:00â8:00/km'},
  ]},
  reg:{label:'Regenerativa',name:'4 km',dur:'35 min',pace:'7:00â7:30/km',tag:'Corrida',optional:true,color:'var(--teal)',steps:[
    {name:'Aquecimento caminhada',type:'warmup',info:'5 min Â· 8:00â9:00/km'},
    {name:'Ritmo regenerativo',type:'run',info:'3.5 km Â· 7:00â7:45/km'},
    {name:'Desaquecimento',type:'cool',info:'5 min Â· 7:30â9:00/km'},
  ]},
};

const SCH={0:{gym:null,run:'reg'},1:{gym:'A',run:null},2:{gym:'B',run:'leve'},3:{gym:null,run:null},4:{gym:'C',run:'tempo'},5:{gym:'A',run:'leve'},6:{gym:'B',run:'longao'}};
const STCOL={warmup:'#F97316',run:'#14B8A6',interval:'#EF4444',recovery:'#8B5CF6',cool:'#6B7280'};

function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function qs(s){return document.querySelector(s)}

let state={
  sel:null,today:null,comps:{},exG:false,exR:false
};

function init(){
  const now=new Date();now.setHours(0,0,0,0);
  state.today=now;state.sel=new Date(now);
  loadComps();
}

function loadComps(){
  const comps={};
  for(let i=-30;i<=7;i++){
    const d=addD(state.today,i);
    const k=dk(d);
    const v=localStorage.getItem('treino:done:'+k);
    if(v){try{comps[k]=JSON.parse(v)}catch(e){}}
  }
  state.comps=comps;
  render();
}

function saveDone(k,data){
  localStorage.setItem('treino:done:'+k,JSON.stringify(data));
}

function toggle(type){
  const k=dk(state.sel);
  const cur=state.comps[k]||{};
  const upd={...cur,[type]:!cur[type]};
  state.comps[k]=upd;
  saveDone(k,upd);
  render();
}

function calcStreak(){
  let s=0,d=new Date(state.today);
  for(let i=0;i<90;i++){
    const k=dk(d);const dw=d.getDay();const sc=SCH[dw];
    const c=state.comps[k]||{};
    const rest=!sc.gym&&!sc.run;
    if(rest){d=addD(d,-1);continue}
    const hit=(sc.gym&&c.gym)||(sc.run&&c.run)||(sc.run&&!sc.gym&&c.run)||(sc.gym&&!sc.run&&c.gym);
    if(hit){s++;d=addD(d,-1);}else break;
  }
  return s;
}

function calcStats(){
  let totalDone=0,gymDone=0,runDone=0;
  const keys=Object.keys(state.comps);
  keys.forEach(k=>{
    const v=state.comps[k];
    if(v.gym){totalDone++;gymDone++;}
    if(v.run){totalDone++;runDone++;}
  });
  return {total:totalDone,gym:gymDone,run:runDone};
}

function navigate(n){
  state.sel=addD(state.sel,n);
  state.exG=false;state.exR=false;
  render();
}

function selectDay(d){
  state.sel=new Date(d);
  state.exG=false;state.exR=false;
  render();
}

function render(){
  const {sel,today,comps}=state;
  const sk=dk(sel);
  const dow=sel.getDay();
  const sch=SCH[dow];
  const gymW=sch.gym?GYM[sch.gym]:null;
  const runW=sch.run?RUN[sch.run]:null;
  const isRest=!gymW&&!runW;
  const isToday=dk(today)===sk;
  const done=comps[sk]||{};
  const streak=calcStreak();
  const stats=calcStats();

  const monStart=addD(sel,-((sel.getDay()+6)%7));
  const week=Array.from({length:7},(_,i)=>addD(monStart,i));

  let html=`<div class="hdr">
    <div class="hdr-left">
      <div class="date">${isToday?'Hoje, ':''}${DAYS[dow]}, ${sel.getDate()} ${MONTHS[sel.getMonth()]}</div>
      ${streak>0?`<div class="streak">ð¥ ${streak} dia${streak>1?'s':''} seguidos</div>`:''}
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="navigate(-1)">â¹</button>
      ${!isToday?`<button class="nav-btn today-btn" onclick="navigate(${Math.round((today-sel)/86400000)})">hoje</button>`:''}
      <button class="nav-btn" onclick="navigate(1)">âº</button>
    </div>
  </div>`;

  // Week strip
  html+=`<div class="week">`;
  week.forEach((d,i)=>{
    const k=dk(d);const dw=d.getDay();const sc=SCH[dw];const c=comps[k]||{};
    const isSel=k===sk;const isTod=k===dk(today);
    const hasAny=sc.gym||sc.run;
    const allDone=(sc.gym?c.gym:true)&&(sc.run?c.run:true);
    const dotColor=hasAny?(allDone?'var(--green)':'var(--orange)'):'transparent';
    const cls=['day-btn',isSel?'selected':'',isTod&&!isSel?'today-outline':''].join(' ');
    html+=`<button class="${cls}" onclick="selectDay(new Date(${d.getTime()}))">
      <span class="day-short" style="${isSel?'color:rgba(255,255,255,.7)':''}">${SHORT[i]}</span>
      <span class="day-num" style="${isSel?'color:#fff':''}">${d.getDate()}</span>
      <div class="day-dot" style="background:${dotColor}"></div>
    </button>`;
  });
  html+=`</div>`;

  if(isRest){
    html+=`<div class="rest-card">
      <div class="rest-icon">ð´</div>
      <div class="rest-title">Descanso</div>
      <div class="rest-sub">RecuperaÃ§Ã£o Ã© parte do treino</div>
      ${sch.run==='reg'?`<div class="rest-opt">ð Regenerativa 4k disponÃvel se quiser</div>`:''}
    </div>`;
  } else {
    if(gymW){
      const dn=done.gym;
      html+=`<div class="wcard${dn?' done':''}" style="border-left-color:${gymW.color}">
        <div class="card-top">
          <div class="${dn?'wdone':''}">
            <div class="wtag" style="color:${gymW.color}">${gymW.tag} Â· ${gymW.label}</div>
            <div class="wtitle">${gymW.name}</div>
            <div class="wmeta">â± ${gymW.dur} Â· ${gymW.exs.length} exercÃ­cios</div>
          </div>
          <button class="done-btn${dn?' checked':''}" onclick="toggle('gym')">${dn?'â':'â'}</button>
        </div>
        <button class="expand-btn" onclick="toggleEx('G')">${state.exG?'â² Fechar':'â¼ Ver exercÃ­cios'}</button>
        ${state.exG?`<div class="ex-list">${gymW.exs.map(ex=>`
          <div class="ex-row">
            <span class="ex-num">${ex.n}</span>
            <span class="ex-name">${ex.name}</span>
            <span class="ex-sets">${ex.sets}</span>
            ${ex.load?`<span class="ex-load">${ex.load}</span>`:''}
          </div>`).join('')}</div>`:''}
      </div>`;
    }
    if(runW){
      const dn=done.run;
      html+=`<div class="wcard${dn?' done':''}" style="border-left-color:${runW.color}">
        <div class="card-top">
          <div class="${dn?'wdone':''}">
            <div class="wtag" style="color:${runW.color}">${runW.tag} Â· ${runW.label}${runW.optional?' Â· opcional':''}</div>
            <div class="wtitle">${runW.name}</div>
            <div class="wmeta">â± ${runW.dur} Â· ð ${runW.pace}</div>
          </div>
          <button class="done-btn${dn?' checked':''}" onclick="toggle('run')">${dn?'â':'â'}</button>
        </div>
        <button class="expand-btn" onclick="toggleEx('R')">${state.exR?'â² Fechar':'â¼ Ver etapas'}</button>
        ${state.exR?`<div class="step-list">${runW.steps.map(st=>`
          <div class="step-row">
            <div class="step-bar" style="background:${STCOL[st.type]||'#666'}"></div>
            <div>
              <div class="step-name">${st.name}</div>
              <div class="step-info">${st.info}</div>
            </div>
          </div>`).join('')}</div>`:''}
      </div>`;
    }
  }

  Stats
  html+=`<div class="stats">
    <div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-lbl">Streak</div></div>
    <div class="stat-card"><div class="stat-num">${stats.gym}</div><div class="stat-lbl">Academia</div></div>
    <div class="stat-card"><div class="stat-num">${stats.run}</div><div class="stat-lbl">Corridas</div></div>
  </div>`;

  qs('#app').innerHTML=html;
}

function toggleEx(t){
  if(t==='G')state.exG=!state.exG;
  else state.exR=!state.exR;
  render();
}

init();
</script>
